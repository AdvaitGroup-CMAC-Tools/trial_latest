<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0">
<title>Advait Trade Finance Dashboard</title>
<style>
:root{
  --p1:#1A4084;--p2:#3A66AA;--p3:#83B1DC;--bg:#eef1f6;--mid:#6b7a99;--dark:#1C1C1C;
  --lcc:#2E86AB;--bgc:#0D4F6C;--emdc:#7A8C2E;
  --green:#1e8449;--amber:#b7770d;--red:#c0392b;--orange:#9a4f00;--purple:#3730a3;
  --border:#d4dce8;--rowalt:#f6f8fc;
  --shadow:0 1px 4px rgba(26,64,132,.07),0 4px 16px rgba(26,64,132,.06);
  --shadow-md:0 2px 8px rgba(26,64,132,.1),0 8px 24px rgba(26,64,132,.08);
  --shadow-lg:0 8px 32px rgba(26,64,132,.15);
  --r:10px;--rs:7px;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:Calibri,"Segoe UI",Arial,sans-serif;background:var(--bg);color:var(--dark);min-height:100vh;font-size:14px}

/* HEADER */
.hdr{background:linear-gradient(135deg,#0f2d6e 0%,var(--p1) 60%,var(--p2) 100%);color:#fff;padding:0 16px;height:52px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:200;box-shadow:0 2px 12px rgba(0,0,0,.25)}
.hL{display:flex;align-items:center;gap:10px;min-width:0;flex:1}
.hLogo{font-size:14px;font-weight:700;letter-spacing:.4px;white-space:nowrap}
.hDiv{width:1px;height:20px;background:rgba(255,255,255,.25);flex-shrink:0}
.hTit{font-size:11px;opacity:.7;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.hR{display:flex;align-items:center;gap:6px;flex-shrink:0}
.aBtn{display:flex;align-items:center;gap:5px;background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.25);color:rgba(255,255,255,.9);padding:5px 10px;border-radius:var(--rs);font-size:11px;font-weight:600;cursor:pointer;font-family:inherit;transition:all .2s;white-space:nowrap}
.aBtn:hover{background:rgba(255,255,255,.2)}.aBtn.active{background:#e8b400;border-color:#e8b400;color:#1a1a1a}
.aBadge{background:#e8b400;color:#1a1a1a;padding:3px 9px;border-radius:20px;font-size:10px;font-weight:700;display:none;white-space:nowrap}
.xBtn{background:rgba(180,30,30,.25);border:1px solid rgba(255,100,100,.3);color:#ffc0c0;padding:5px 10px;border-radius:var(--rs);font-size:11px;font-weight:600;cursor:pointer;font-family:inherit;display:none;white-space:nowrap}

/* STATUS INDICATORS */
.statusRow{display:flex;align-items:center;gap:6px;padding:5px 16px;background:#f8faff;border-bottom:1px solid var(--border);font-size:11px;flex-wrap:wrap;gap:8px}
.sInd{display:flex;align-items:center;gap:5px;padding:3px 10px;border-radius:20px;font-weight:600;font-size:11px;cursor:default}
.sInd.connected{background:#d4edda;color:#1e6e3a}.sInd.disconnected{background:#f8d7da;color:#721c24}
.sInd.live{background:#d4edda;color:#1e6e3a}.sInd.offline{background:#e9ecef;color:#6c757d}
.sDot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.sInd.connected .sDot,.sInd.live .sDot{background:#28a745;animation:pulse 2s infinite}
.sInd.disconnected .sDot{background:#dc3545}
.sInd.offline .sDot{background:#aaa}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}

/* ADMIN PANEL */
#aPanel{display:none;background:linear-gradient(135deg,#0a2460,#0d2d6b);border-bottom:2px solid #e8b400;padding:11px 16px}
#aPanel .inn{display:flex;align-items:center;gap:10px;flex-wrap:wrap}
#aPanel label{color:rgba(255,255,255,.65);font-size:10px;font-weight:700;letter-spacing:.5px;text-transform:uppercase}
#aPwd{padding:7px 12px;border:1.5px solid rgba(255,255,255,.22);border-radius:var(--rs);background:rgba(255,255,255,.08);color:#fff;font-size:13px;font-family:inherit;outline:none;width:200px}
#aPwd:focus{border-color:#e8b400}
.auBtn{padding:7px 18px;background:#e8b400;color:#1a1a1a;border:none;border-radius:var(--rs);font-size:12px;font-weight:700;cursor:pointer;font-family:inherit}
#aPErr{color:#ff9090;font-size:11px;display:none}
.acBtn{padding:5px 12px;background:transparent;color:rgba(255,255,255,.45);border:1px solid rgba(255,255,255,.18);border-radius:var(--rs);font-size:11px;cursor:pointer;font-family:inherit;margin-left:auto}

/* TABS */
.tabNav{background:#fff;border-bottom:2px solid var(--border);display:flex;padding:0 8px;overflow-x:auto;position:sticky;top:52px;z-index:100;box-shadow:0 2px 6px rgba(26,64,132,.05);scrollbar-width:none}
.tabNav::-webkit-scrollbar{display:none}
.tab{padding:11px 14px;font-size:11px;font-weight:600;color:var(--mid);border:none;background:none;cursor:pointer;border-bottom:3px solid transparent;margin-bottom:-2px;white-space:nowrap;font-family:inherit;transition:all .2s;letter-spacing:.1px;flex-shrink:0}
.tab:hover{color:var(--p1)}.tab.active{color:var(--p1);border-bottom-color:var(--p1)}
.tab.tlc.active{color:var(--lcc);border-bottom-color:var(--lcc)}
.tab.tbg.active{color:var(--bgc);border-bottom-color:var(--bgc)}
.tab.temd.active{color:var(--emdc);border-bottom-color:var(--emdc)}
.tbc{display:none}.tbc.active{display:block}
.main{padding:14px;max-width:1800px;margin:0 auto}

/* SUMMARY STAT CARDS */
.statGrid{display:grid;grid-template-columns:repeat(6,1fr);gap:12px;margin-bottom:18px}
.statCard{background:#fff;border-radius:var(--r);padding:16px 14px 12px;box-shadow:var(--shadow);position:relative;overflow:hidden;border:1px solid rgba(220,228,240,.8);transition:box-shadow .2s,transform .15s}
.statCard::before{content:'';position:absolute;top:0;left:0;right:0;height:4px;border-radius:var(--r) var(--r) 0 0}
.statCard.lc::before{background:linear-gradient(90deg,var(--lcc),#5ab4d6)}
.statCard.bg::before{background:linear-gradient(90deg,var(--bgc),#2a7a9e)}
.statCard.emd::before{background:linear-gradient(90deg,var(--emdc),#b5c93d)}
.statCard.amber::before{background:linear-gradient(90deg,var(--amber),#e8a020)}
.statCard.orange::before{background:linear-gradient(90deg,var(--orange),#c47000)}
.statCard.green::before{background:linear-gradient(90deg,var(--green),#27ae60)}
.statCard.clk{cursor:pointer}.statCard.clk:hover{box-shadow:var(--shadow-md);transform:translateY(-2px)}
.sIcon{font-size:18px;margin-bottom:6px;display:block}
.sLbl{font-size:9px;color:var(--mid);font-weight:700;letter-spacing:.5px;text-transform:uppercase;margin-bottom:5px}
.sNum{font-size:28px;font-weight:700;line-height:1;margin-bottom:3px}
.sSub{font-size:10px;color:var(--mid)}
.statCard.lc .sNum{color:var(--lcc)}.statCard.bg .sNum{color:var(--bgc)}.statCard.emd .sNum{color:var(--emdc)}
.statCard.amber .sNum{color:var(--amber)}.statCard.orange .sNum{color:var(--orange)}.statCard.green .sNum{color:var(--green)}

/* BREAKDOWN */
.bdSec{background:#fff;border-radius:var(--r);box-shadow:var(--shadow);margin-bottom:16px;overflow:hidden;border:1px solid var(--border)}
.bdStripe{height:4px}
.bdStripe.lc{background:linear-gradient(90deg,var(--lcc),#5ab4d6)}
.bdStripe.bg{background:linear-gradient(90deg,var(--bgc),#2a7a9e)}
.bdStripe.emd{background:linear-gradient(90deg,var(--emdc),#b5c93d)}
.bdHead{padding:12px 16px;display:flex;align-items:center;gap:8px;border-bottom:1px solid var(--border)}
.bdHeadTit{font-size:13px;font-weight:700;color:var(--dark)}
.bdCards{display:grid;grid-template-columns:repeat(7,1fr)}
.bdCard{padding:14px 10px 12px;border-right:1px solid var(--border);cursor:pointer;transition:background .15s;text-align:center}
.bdCard:last-child{border-right:none}
.bdCard:hover{background:#f5f8ff}
.bdCLbl{font-size:9px;color:var(--mid);font-weight:700;letter-spacing:.4px;text-transform:uppercase;margin-bottom:6px}
.bdCNum{font-size:22px;font-weight:700;line-height:1}
.bdCNum.lc{color:var(--lcc)}.bdCNum.bg{color:var(--bgc)}.bdCNum.emd{color:var(--emdc)}
.bdCNum.amber{color:var(--amber)}.bdCNum.purple{color:var(--purple)}.bdCNum.blue{color:var(--p1)}.bdCNum.green{color:var(--green)}.bdCNum.orange{color:var(--orange)}.bdCNum.grey{color:var(--mid)}
.bdAlert{margin:0 14px 12px;background:#fff9e6;border:1px solid #ffd060;border-radius:var(--rs);padding:8px 12px;font-size:11px;color:#856404}

/* MINI STAT CARDS (in LC/BG/EMD tabs) */
.miniCards{display:grid;grid-template-columns:repeat(7,1fr);gap:8px;margin-bottom:14px}
.mCard{background:#fff;border-radius:var(--rs);padding:10px 10px 8px;box-shadow:var(--shadow);border-top:3px solid var(--p1);text-align:center}
.mCard.lc{border-top-color:var(--lcc)}.mCard.bg{border-top-color:var(--bgc)}.mCard.emd{border-top-color:var(--emdc)}
.mCard.amber{border-top-color:var(--amber)}.mCard.green{border-top-color:var(--green)}.mCard.orange{border-top-color:var(--orange)}.mCard.purple{border-top-color:var(--purple)}.mCard.grey{border-top-color:var(--mid)}.mCard.blue{border-top-color:var(--p1)}
.mLbl{font-size:9px;color:var(--mid);font-weight:700;letter-spacing:.4px;text-transform:uppercase;margin-bottom:4px}
.mNum{font-size:20px;font-weight:700;line-height:1}
.mCard.lc .mNum{color:var(--lcc)}.mCard.bg .mNum{color:var(--bgc)}.mCard.emd .mNum{color:var(--emdc)}
.mCard.amber .mNum{color:var(--amber)}.mCard.green .mNum{color:var(--green)}.mCard.orange .mNum{color:var(--orange)}.mCard.purple .mNum{color:var(--purple)}.mCard.grey .mNum{color:var(--mid)}.mCard.blue .mNum{color:var(--p1)}

/* SEARCH BAR */
.srchWrap{background:#fff;border-radius:var(--r);padding:12px 14px;box-shadow:var(--shadow);margin-bottom:14px;border:1px solid var(--border)}
.srchLbl{font-size:9px;color:var(--mid);font-weight:700;letter-spacing:.5px;text-transform:uppercase;margin-bottom:7px}
.srchRow{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
.srchBox{flex:1;min-width:200px;position:relative}
.srchBox input{width:100%;padding:9px 12px 9px 36px;border:1.5px solid var(--border);border-radius:8px;font-size:13px;font-family:inherit;color:var(--dark);background:#fff;outline:none;transition:border-color .2s}
.srchBox input:focus{border-color:var(--p1)}
.srchBox::before{content:'🔍';position:absolute;left:11px;top:50%;transform:translateY(-50%);font-size:13px;pointer-events:none}
.sTags{display:flex;gap:5px;flex-wrap:wrap;align-items:center}
.sTag{padding:4px 10px;background:var(--bg);border:1.5px solid var(--border);border-radius:16px;font-size:10px;font-weight:600;color:var(--mid);cursor:pointer;transition:all .18s;white-space:nowrap}
.sTag:hover,.sTag.on{background:var(--p1);color:#fff;border-color:var(--p1)}
.sTag.lc:hover,.sTag.lc.on{background:var(--lcc);border-color:var(--lcc)}
.sTag.bg:hover,.sTag.bg.on{background:var(--bgc);border-color:var(--bgc)}
.sTag.emd:hover,.sTag.emd.on{background:var(--emdc);border-color:var(--emdc)}
.clrBtn{padding:7px 13px;background:#fff;color:var(--mid);border:1.5px solid var(--border);border-radius:var(--rs);font-size:11px;cursor:pointer;font-family:inherit;white-space:nowrap}
.clrBtn:hover{border-color:var(--p1);color:var(--p1)}

/* SECTION TITLE */
.secT{font-size:13px;font-weight:700;color:var(--dark);margin-bottom:10px;padding-bottom:6px;border-bottom:2px solid var(--border)}

/* INSTRUMENT CARDS */
.iList{display:flex;flex-direction:column;gap:7px;margin-bottom:20px}
.iCard{background:#fff;border-radius:var(--r);box-shadow:var(--shadow);overflow:hidden;border:1px solid var(--border)}
.iCard.lc{border-left:4px solid var(--lcc)}.iCard.bg{border-left:4px solid var(--bgc)}.iCard.emd{border-left:4px solid var(--emdc)}
.iHead{padding:11px 14px;display:flex;align-items:center;gap:8px;cursor:pointer;transition:background .15s;user-select:none}
.iHead:hover{background:#f5f8ff}
.iId{font-size:12px;font-weight:700;flex-shrink:0;min-width:72px}
.iId.lc{color:var(--lcc)}.iId.bg{color:var(--bgc)}.iId.emd{color:var(--emdc)}
.iMeta{flex:1;display:flex;flex-wrap:wrap;gap:4px 12px;align-items:center;min-width:0}
.iM{font-size:11px;color:var(--mid)}.iM strong{color:var(--dark);font-weight:600}
.iR{display:flex;align-items:center;gap:6px;flex-shrink:0}
.iCnt{font-size:10px;color:var(--mid);background:var(--bg);padding:2px 8px;border-radius:10px;white-space:nowrap;border:1px solid var(--border)}
.iTog{font-size:12px;color:var(--mid);transition:transform .2s}.iTog.open{transform:rotate(180deg)}
.iBody{display:none;border-top:1px solid var(--border)}.iBody.open{display:block}

/* PROGRESS */
.iProg{padding:8px 14px;background:linear-gradient(135deg,#f5f8ff,#eef1f8);border-bottom:1px solid var(--border)}
.iPLbl{display:flex;justify-content:space-between;font-size:10px;color:var(--mid);margin-bottom:4px;font-weight:600}
.iPBar{height:5px;background:#dde3ef;border-radius:3px;overflow:hidden}
.iPFill{height:100%;border-radius:3px}
.iPFill.lc{background:linear-gradient(90deg,var(--lcc),#5ab4d6)}
.iPFill.bg{background:linear-gradient(90deg,var(--bgc),#2a7a9e)}
.iPFill.emd{background:linear-gradient(90deg,var(--emdc),#b5c93d)}

/* DETAIL PANEL */
.iDet{padding:12px 14px;background:#fafbff;border-bottom:1px solid var(--border)}
.iDG{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:8px 14px}
.iDF{display:flex;flex-direction:column;gap:1px}
.iDLbl{font-size:9px;color:var(--mid);font-weight:700;text-transform:uppercase;letter-spacing:.3px}
.iDVal{font-size:12px;color:var(--dark);font-weight:600}

/* ACTIVITY TABLE */
.tWrap{overflow-x:auto;-webkit-overflow-scrolling:touch}
.actT{width:100%;border-collapse:collapse;min-width:780px}
.actT thead tr{background:var(--p1)}
.actT.lc thead tr{background:var(--lcc)}.actT.bg thead tr{background:var(--bgc)}.actT.emd thead tr{background:var(--emdc)}
.actT thead th{color:#fff;padding:8px 9px;font-size:9px;font-weight:700;text-align:left;white-space:nowrap;letter-spacing:.4px;text-transform:uppercase;border-right:1px solid rgba(255,255,255,.12)}
.actT thead th.clkH{cursor:pointer}.actT thead th.clkH:hover{background:rgba(255,255,255,.15)}
.actT thead th:last-child{border-right:none}
.actT tbody tr{border-bottom:1px solid var(--border)}.actT tbody tr:nth-child(even){background:var(--rowalt)}.actT tbody tr:hover{background:#edf2fb}
.actT tbody td{padding:7px 9px;font-size:11px;color:var(--dark);vertical-align:middle}

/* BADGES */
.badge{display:inline-block;padding:2px 8px;border-radius:10px;font-size:10px;font-weight:700;white-space:nowrap;line-height:1.5}
.b-action{background:#fff3cd;color:#856404;border:1px solid #ffd060}
.b-update{background:#e3edf7;color:var(--p1);border:1px solid #b8d0e8}
.b-issued{background:#d4edda;color:var(--green);border:1px solid #a8d5b0}
.b-amendment{background:#fde8d8;color:#8a4000;border:1px solid #f5c097}
.b-closed{background:#e9e9e9;color:var(--mid);border:1px solid #ccc}
.b-request{background:#ede9fe;color:var(--purple);border:1px solid #c4b5fd}
.b-overridden{background:#ffd8f0;color:#7a0050;border:1px solid #f9a8d4}
.amendBadge{display:inline-block;background:#fde8d8;color:#8a4000;padding:2px 7px;border-radius:8px;font-size:10px;font-weight:700;border:1px solid #f5c097}

/* OVERRIDE BTN */
.ovBtn{padding:2px 8px;background:#fff9e6;color:#6b4c00;border:1px solid #ffd060;border-radius:4px;font-size:10px;font-weight:600;cursor:pointer;font-family:inherit;display:none}
.ovBtn.show{display:inline-block}.ovBtn:hover{background:#ffe580}

/* ATT LINK */
.aLnk{color:var(--p1);text-decoration:none;font-size:11px;font-weight:600;padding:1px 5px;border-radius:3px;background:#e8f0fc}
.aLnk:hover{background:var(--p3);color:#fff}

/* TYPE TABS */
.ttRow{display:flex;gap:7px;margin-bottom:14px;flex-wrap:wrap}
.ttab{padding:6px 16px;border:2px solid var(--border);border-radius:18px;font-size:11px;font-weight:600;cursor:pointer;background:#fff;font-family:inherit;transition:all .2s;color:var(--mid)}
.ttab.active.lc{border-color:var(--lcc);color:var(--lcc);background:#e6f2f8}
.ttab.active.bg{border-color:var(--bgc);color:var(--bgc);background:#e0eaf3}
.ttab.active.emd{border-color:var(--emdc);color:var(--emdc);background:#eef2e0}

/* FLOW */
.fGrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(270px,1fr));gap:12px}
.fCard{background:#fff;border-radius:var(--r);box-shadow:var(--shadow);overflow:hidden;border:1px solid var(--border)}
.fCard.lc{border-top:4px solid var(--lcc)}.fCard.bg{border-top:4px solid var(--bgc)}.fCard.emd{border-top:4px solid var(--emdc)}
.fCH{padding:11px 13px 7px;border-bottom:1px solid var(--border)}
.fCSt{font-size:9px;font-weight:700;color:var(--mid);margin-bottom:3px;letter-spacing:.3px}
.fCSu{font-size:12px;font-weight:700;color:var(--dark);line-height:1.3;margin-bottom:5px}
.fCA{display:flex;align-items:center;gap:4px;font-size:10px;font-weight:600;color:var(--mid)}
.fCF,.fCT{padding:1px 6px;border-radius:3px;background:var(--bg);font-size:10px;border:1px solid var(--border)}
.fCB{padding:9px 13px;font-size:11px;color:var(--mid);line-height:1.5}
.fCBs{font-weight:600;color:var(--dark);margin-bottom:3px;font-size:11px}

/* EMAIL */
.eCard{background:#fff;border-radius:var(--r);box-shadow:var(--shadow);margin-bottom:8px;overflow:hidden;border:1px solid var(--border)}
.eHead{padding:10px 14px;display:flex;align-items:center;justify-content:space-between;cursor:pointer;transition:background .15s}
.eHead:hover{background:#f5f8ff}
.eSubj{font-size:12px;font-weight:700;color:var(--dark);flex:1}
.eTgl{color:var(--mid);font-size:13px;transition:transform .2s;flex-shrink:0}.eTgl.open{transform:rotate(180deg)}
.eBW{display:none;border-top:1px solid var(--border)}.eBW.open{display:block}
.eSR{display:flex;align-items:flex-start;gap:10px;padding:11px 14px;border-bottom:1px solid var(--border);background:#fafbff}
.eST{flex:1;font-size:12px;font-weight:600;color:var(--dark);line-height:1.4}
.cSB{flex-shrink:0;padding:6px 13px;background:#f0f4ff;color:var(--p1);border:1.5px solid var(--p3);border-radius:var(--rs);font-size:11px;font-weight:600;cursor:pointer;font-family:inherit;white-space:nowrap}
.cSB:hover{background:var(--p1);color:#fff}
.eFA{padding:11px 14px}
.eFLbl{font-size:9px;font-weight:700;color:var(--mid);letter-spacing:.5px;text-transform:uppercase;margin-bottom:7px}
.eFRow{display:flex;gap:8px;padding:5px 0;border-bottom:1px solid #f0f2f5}
.eFKey{font-size:12px;font-weight:600;color:var(--dark);min-width:165px;flex-shrink:0}
.eFDummy{font-size:12px;color:var(--p2);font-weight:600}
.cBB{margin-top:10px;padding:6px 16px;background:var(--p1);color:#fff;border:none;border-radius:var(--rs);font-size:11px;font-weight:600;cursor:pointer;font-family:inherit}
.cBB:hover{background:var(--p2)}

/* MODAL */
.moOv{display:none;position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:500;align-items:center;justify-content:center;padding:16px}
.moOv.open{display:flex}
.modal{background:#fff;border-radius:12px;padding:24px;width:100%;max-width:460px;box-shadow:var(--shadow-lg)}
.moTit{font-size:15px;font-weight:700;color:var(--dark);margin-bottom:16px}
.moF{margin-bottom:12px}.moF label{font-size:10px;font-weight:700;color:var(--mid);display:block;margin-bottom:4px;text-transform:uppercase;letter-spacing:.3px}
.moF select,.moF textarea,.moF input{width:100%;padding:8px 11px;border:1.5px solid var(--border);border-radius:var(--rs);font-size:13px;font-family:inherit;color:var(--dark);outline:none}
.moF select:focus,.moF textarea:focus{border-color:var(--p1)}.moF textarea{resize:vertical;min-height:65px}
.moBtns{display:flex;gap:8px;justify-content:flex-end;margin-top:16px}
.moSave{padding:8px 20px;background:var(--p1);color:#fff;border:none;border-radius:var(--rs);font-size:13px;font-weight:600;cursor:pointer;font-family:inherit}
.moCanc{padding:8px 16px;background:#fff;color:var(--mid);border:1.5px solid var(--border);border-radius:var(--rs);font-size:13px;cursor:pointer;font-family:inherit}

/* FB SETUP INFO */
.fbInfo{background:linear-gradient(135deg,#e8f0fe,#f0f6ff);border:1px solid #b3c9f7;border-radius:var(--r);padding:16px 18px;margin-bottom:16px}
.fbInfo h4{font-size:13px;font-weight:700;color:var(--p1);margin-bottom:12px;display:flex;align-items:center;gap:8px}
.fbStep{display:flex;gap:10px;margin-bottom:10px;align-items:flex-start}
.fbNum{background:var(--p1);color:#fff;border-radius:50%;width:22px;height:22px;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;flex-shrink:0;margin-top:1px}
.fbTxt{font-size:12px;color:#1a3a6b;line-height:1.6}
.fbTxt code{background:#d0e0f8;padding:1px 6px;border-radius:3px;font-size:11px;font-family:monospace;color:#0a2460}
.fbTxt a{color:var(--p1);font-weight:600}
.fbTxt strong{color:var(--p1)}
.copyCodeBtn{margin-top:6px;padding:5px 12px;background:var(--p1);color:#fff;border:none;border-radius:5px;font-size:11px;font-weight:600;cursor:pointer;font-family:inherit}

.noData{text-align:center;padding:36px;color:var(--mid);font-size:13px}

/* ── MOBILE RESPONSIVE ── */
@media(max-width:768px){
  .statGrid{grid-template-columns:repeat(3,1fr);gap:8px}
  .miniCards{grid-template-columns:repeat(4,1fr);gap:6px}
  .bdCards{grid-template-columns:repeat(4,1fr)}
  .bdCard:nth-child(n+5){border-top:1px solid var(--border)}
  .iDG{grid-template-columns:repeat(2,1fr)}
  .hTit{display:none}
  .aBadge{display:none!important}
}
@media(max-width:480px){
  .statGrid{grid-template-columns:repeat(2,1fr);gap:7px}
  .miniCards{grid-template-columns:repeat(2,1fr);gap:6px}
  .bdCards{grid-template-columns:repeat(2,1fr)}
  .bdCard{border-right:1px solid var(--border)!important;border-bottom:1px solid var(--border)}
  .bdCard:nth-child(2n){border-right:none!important}
  .iHead{flex-wrap:wrap;gap:6px}
  .iMeta{width:100%}
  .iR{width:100%;justify-content:flex-start}
  .srchRow{flex-direction:column;align-items:stretch}
  .srchBox{min-width:unset}
  .main{padding:10px}
  .statCard{padding:12px 10px 10px}
  .sNum{font-size:22px}
  .mNum{font-size:18px}
  .tab{padding:9px 10px;font-size:10px}
}
</style>
</head>

<div class="hdr">
  <div class="hL">
    <button class="aBtn" id="aBtn" onclick="toggleAP()"><span id="aIco">🔒</span> <span id="aTxt">Admin</span></button>
    <div class="hDiv"></div>
    <div class="hLogo">ADVAIT GROUP</div>
    <div class="hDiv"></div>
    <div class="hTit">Trade Finance Internal Dashboard</div>
  </div>
  <div class="hR">

    <button class="xBtn" id="xBtn" onclick="doLogout()">🔓 Exit</button>
  </div>
</div>

<div class="statusRow">

  <button onclick="testGSConnection()" style="padding:3px 10px;background:#e8f0fe;color:#1a4084;border:1px solid #b3c9f7;border-radius:5px;font-size:10px;font-weight:600;cursor:pointer;font-family:inherit">🔄 Test Connection</button>
  <div style="margin-left:auto;font-size:10px;color:var(--mid)" id="lastRef">—</div>
</div>

<div id="aPanel">
  <div class="inn">
    <label>Admin Password</label>
    <input type="password" id="aPwd" placeholder="Enter password…" onkeydown="if(event.key==='Enter')submitAdmin()" onfocus="this.style.borderColor='#e8b400'" onblur="this.style.borderColor='rgba(255,255,255,.22)'"/>
    <button class="auBtn" onclick="submitAdmin()">Unlock</button>
    <span id="aPErr">✕ Incorrect</span>
    <button class="acBtn" onclick="closeAP()">Cancel</button>
  </div>
</div>

<div class="tabNav">
  <button class="tab active" onclick="switchTab(this,'summary')">📊 Summary</button>
  <button class="tab tlc" onclick="switchTab(this,'lc')">📄 LC</button>
  <button class="tab tbg" onclick="switchTab(this,'bg')">🏦 BG</button>
  <button class="tab temd" onclick="switchTab(this,'emd')">💼 EMD</button>
  <button class="tab" onclick="switchTab(this,'flow')">🔄 Process Flow</button>
  <button class="tab" onclick="switchTab(this,'emails')">✉️ Email Templates</button>
</div>

<div id="tab-summary" class="tbc active"><div class="main"><div id="sumContent"></div></div></div>
<div id="tab-lc" class="tbc"><div class="main"><div id="lcContent"></div></div></div>
<div id="tab-bg" class="tbc"><div class="main"><div id="bgContent"></div></div></div>
<div id="tab-emd" class="tbc"><div class="main"><div id="emdContent"></div></div></div>
<div id="tab-flow" class="tbc"><div class="main">
  <div class="ttRow">
    <button class="ttab active lc" onclick="switchFT(this,'LC')">LC — 21 Steps</button>
    <button class="ttab" onclick="switchFT(this,'BG')">BG — 26 Steps</button>
    <button class="ttab" onclick="switchFT(this,'EMD')">EMD — 24 Steps</button>
  </div><div id="flowContent"></div>
</div></div>
<div id="tab-emails" class="tbc"><div class="main">
  <div class="ttRow">
    <button class="ttab active lc" onclick="switchET(this,'LC')">LC — 21 Templates</button>
    <button class="ttab" onclick="switchET(this,'BG')">BG — 26 Templates</button>
    <button class="ttab" onclick="switchET(this,'EMD')">EMD — 24 Templates</button>
  </div><div id="emailContent"></div>
</div></div>

<div class="moOv" id="moOv">
  <div class="modal">
    <div class="moTit">⚙ Admin Override — Change Status</div>
    <div class="moF"><label>Instrument</label><input type="text" id="moInstr" readonly style="background:#f5f5f5"/></div>
    <div class="moF"><label>Current Status</label><input type="text" id="moCurr" readonly style="background:#f5f5f5"/></div>
    <div class="moF"><label>New Status</label><select id="moStat"></select></div>
    <div class="moF"><label>Admin Note</label><textarea id="moNote" placeholder="Reason for override…"></textarea></div>
    <div class="moBtns">
      <button class="moCanc" onclick="closeModal()">Cancel</button>
      <button class="moSave" onclick="saveOverride()">Save Override</button>
    </div>
  </div>
</div>

// ══ FIELD ACCESSOR — handles both local camelCase keys and Google Sheet header names ══
function fld(r,keys){
  for(const k of keys){
    if(r[k]!==undefined&&r[k]!==null){
      const v=String(r[k]).trim();
      if(v&&v!=='nan'&&v!=='NaN'&&v!=='None'&&v!=='undefined'&&v!=='null') return v;
    }
  }
  return '';
}

// ══ GROUPING ══
function groupLC(recs){
  const g={};
  for(const r of recs){
    const status=fld(r,['status','Status']);
    if(!status) continue;
    const proj=fld(r,['projectName','Project Name','ITEM NAME']).toLowerCase();
    const item=fld(r,['itemName','Item Name','ITEM NAME']).toLowerCase();
    const vend=fld(r,['vendorName','Vendor Name']).toLowerCase();
    const amt=fld(r,['lcAmount','LC Amount']).replace(/\.0$/,'');
    const k=`${proj}||${item}||${vend}||${amt}`;
    if(!g[k])g[k]={rows:[],lcNo:'',
      projectName:fld(r,['projectName','Project Name']),
      itemName:fld(r,['itemName','Item Name','ITEM NAME']),
      vendorName:fld(r,['vendorName','Vendor Name']),
      lcAmount:fld(r,['lcAmount','LC Amount']),
      company:fld(r,['company','Company']),
      division:fld(r,['division','Division']),
      subDiv:fld(r,['subDiv','Sub Division']),
      sbuName:fld(r,['sbuName','SBU Name']),
      projectCode:fld(r,['projectCode','Project Code']),
      uom:fld(r,['uom','UOM']),qty:fld(r,['qty','Quantity']),
      itemCode:fld(r,['itemCode','Item Code']),
      amendDate:'',hasAmend:false};
    g[k].rows.push(r);
    const lcNo=fld(r,['lcNo','LC NO','LC No']);
    if(lcNo) g[k].lcNo=lcNo.replace(/\.0$/,'');
    const amd=fld(r,['amendDate','Amendment Required By Date']);
    if(amd){g[k].amendDate=amd;g[k].hasAmend=true;}
  }
  return Object.values(g);
}

function getLatestOv(rows,gKey){
  for(let i=rows.length-1;i>=0;i--){

      <div class="iBody" id="emd-${gi}-body">${instrBody(g,gi,'emd','EMD',EMD_STATUSES.length)}</div>
    </div>`;
  });
  document.getElementById('emdContent').innerHTML=html+'</div>';
  if(filter)document.getElementById('emdSrch').value=filter;
}
window.clrEMD=()=>{document.getElementById('emdSrch').value='';renderEMD('');};

window.togI=id=>{document.getElementById(id+'-body').classList.toggle('open');document.getElementById(id+'-tog').classList.toggle('open');};

// ══ FLOW ══
window.switchFT=(btn,type)=>{document.querySelectorAll('#tab-flow .ttab').forEach(b=>b.classList.remove('active','lc','bg','emd'));btn.classList.add('active',type.toLowerCase());renderFlow(type);};
function renderFlow(type){const data=FLOW_DATA[type]||[],t=type.toLowerCase();document.getElementById('flowContent').innerHTML=`<div class="fGrid">${data.map(r=>{const p=(r.flow||'').split('→').map(s=>s.trim());return`<div class="fCard ${t}"><div class="fCH"><div class="fCSt">STEP ${r.no}</div><div class="fCSu">${r.subject}</div><div class="fCA"><span class="fCF">${p[0]||''}</span><span>→</span><span class="fCT">${p[1]||''}</span></div></div><div class="fCB"><div class="fCBs">${r.short}</div>${r.detail}</div></div>`;}).join('')}</div>`;}

// ══ EMAILS ══
window.switchET=(btn,type)=>{document.querySelectorAll('#tab-emails .ttab').forEach(b=>b.classList.remove('active','lc','bg','emd'));btn.classList.add('active',type.toLowerCase());renderEmails(type);};
function renderEmails(type){const data=EMAIL_DATA[type]||[];document.getElementById('emailContent').innerHTML=`<p style="font-size:11px;color:var(--mid);margin-bottom:10px">${type} — ${data.length} templates with pre-filled sample data.</p>`+data.map((item,idx)=>`<div class="eCard"><div class="eHead" onclick="togE(${idx},'${type}')"><div class="eSubj">${item.subject}</div><div class="eTgl" id="et-${type}-${idx}">▾</div></div><div class="eBW" id="eb-${type}-${idx}"><div class="eSR"><div><div style="font-size:9px;font-weight:700;color:var(--mid);letter-spacing:.5px;text-transform:uppercase;margin-bottom:3px">SUBJECT</div><div class="eST">${item.subject}</div></div><button class="cSB" id="csb-${type}-${idx}" onclick="cpyS('${type}',${idx})">📋 Copy Subject</button></div><div class="eFA"><div class="eFLbl">Body — pre-filled sample data</div>${item.fields.map(f=>f.field==='Thanks'?`<div class="eFRow"><div class="eFKey" style="font-weight:700">Thanks</div></div>`:`<div class="eFRow"><div class="eFKey">${f.field}:</div><div class="eFDummy">${f.dummy}</div></div>`).join('')}<button class="cBB" id="cbb-${type}-${idx}" onclick="cpyB('${type}',${idx})">📋 Copy Body</button></div></div></div>`).join('');}
window.togE=(i,t)=>{document.getElementById(`eb-${t}-${i}`).classList.toggle('open');document.getElementById(`et-${t}-${i}`).classList.toggle('open');};
window.cpyS=(type,idx)=>{const t=EMAIL_DATA[type][idx].subject,b=document.getElementById(`csb-${type}-${idx}`);navigator.clipboard.writeText(t).then(()=>{b.textContent='✅ Copied!';setTimeout(()=>b.textContent='📋 Copy Subject',2000)}).catch(()=>prompt('Subject:',t));};
window.cpyB=(type,idx)=>{const item=EMAIL_DATA[type][idx],text=item.fields.map(f=>f.field==='Thanks'?'Thanks':`${f.field}: ${f.dummy}`).join('\n'),b=document.getElementById(`cbb-${type}-${idx}`);navigator.clipboard.writeText(text).then(()=>{b.textContent='✅ Copied!';setTimeout(()=>b.textContent='📋 Copy Body',2000)}).catch(()=>prompt('Body:',text));};

// ══ OVERRIDE MODAL ══
window.openModal=(tL,gi,ri,tU)=>{const sts=tU==='LC'?LC_STATUSES:tU==='BG'?BG_STATUSES:EMD_STATUSES;const groups=tU==='LC'?groupLC(allRec.LC):tU==='BG'?groupBG(allRec.BG):groupEMD(allRec.EMD);const g=groups[+gi],r=g?.rows[+ri];document.getElementById('moInstr').value=`${tU}-${+gi+1} / Row ${+ri+1}`;document.getElementById('moCurr').value=r?.status||'';document.getElementById('moStat').innerHTML=sts.map(s=>`<option value="${s}"${r?.status===s?' selected':''}>${s}</option>`).join('');document.getElementById('moNote').value='';modalMeta={tL,gi:+gi,ri:+ri,tU};document.getElementById('moOv').classList.add('open');};
window.closeModal=()=>document.getElementById('moOv').classList.remove('open');
window.saveOverride=()=>{if(!modalMeta)return;const{tL,gi,ri}=modalMeta,key=`${tL}_${gi}_${ri}`;overrides[key]={status:document.getElementById('moStat').value,note:document.getElementById('moNote').value,ts:new Date().toISOString(),by:'Admin'};localStorage.setItem('tfOv',JSON.stringify(overrides));if(FIREBASE_URL)fetch(`${FIREBASE_URL}/overrides/${key}.json`,{method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify(overrides[key])}).catch(()=>{});closeModal();renderAll();};

// ══ DATA LOAD ══
async function loadFB(){
  if(!FIREBASE_URL){fbConnected=false;updateStatusUI();return;}
  try{const r=await fetch(`${FIREBASE_URL}/overrides.json`);if(r.ok){const d=await r.json();if(d)overrides={...overrides,...d};}fbConnected=true;}
  catch(e){fbConnected=false;}
  updateStatusUI();
}
// ══ GOOGLE SHEET LOAD — JSONP approach (bypasses CORS for Apps Script) ══
let gsLoadTimeout=null;

// Debug: test URL directly
function testGSConnection(){
  const url = SHEET_WEBHOOK_URL + '?callback=__gsCallback';
  document.getElementById('gsTxt').textContent = 'Google Sheet: Testing…';
  console.log('Testing URL:', url);
  loadData().then(()=>{
    renderAll();
    if(gsConnected){
      alert('✅ Connected! LC rows: '+allRec.LC.length+' | BG: '+allRec.BG.length+' | EMD: '+allRec.EMD.length);
    } else {
      alert('❌ Still not connecting.\n\nURL:\n'+url);
    }
  });
}

function loadData(){
  return new Promise((resolve)=>{
    if(window.__gsCallback) delete window.__gsCallback;
    const old=document.getElementById('gsScript');
    if(old) old.remove();

    // Increase to 20s — sheet data can be large
    gsLoadTimeout=setTimeout(()=>{
      console.warn('Google Sheet timeout');
      if(!allRec.LC.length)allRec.LC=RAW_LC;
      if(!allRec.BG.length)allRec.BG=RAW_BG;
      if(!allRec.EMD.length)allRec.EMD=RAW_EMD;
      gsConnected=false;
      updateStatusUI();
      resolve();
    },20000);

    window.__gsCallback=function(d){
      clearTimeout(gsLoadTimeout);
      try{
        // Normalize keys from Google Sheet (headers may differ from local RAW_ keys)
        function normalizeRows(rows){
          if(!rows||!rows.length) return [];
          return rows.map(r=>{
            const n={};
            Object.keys(r).forEach(k=>{
              // Convert header to camelCase-ish key
              const clean=k.trim();
              n[clean]=r[k];
              // Also map common header name variants
              const lk=clean.toLowerCase().replace(/\s+/g,'');
              n[lk]=r[k];
            });
            return n;
          }).filter(r=>{
            // Filter out blank rows
            const vals=Object.values(r).map(v=>String(v||'').trim());
            return vals.some(v=>v&&v!=='nan'&&v!=='NaN'&&v!=='undefined'&&v!=='');
          });
        }
        if(d.LC&&Array.isArray(d.LC)&&d.LC.length>0) allRec.LC=normalizeRows(d.LC);
        else allRec.LC=RAW_LC;
        if(d.BG&&Array.isArray(d.BG)&&d.BG.length>0) allRec.BG=normalizeRows(d.BG);
        else allRec.BG=RAW_BG;
        if(d.EMD&&Array.isArray(d.EMD)&&d.EMD.length>0) allRec.EMD=normalizeRows(d.EMD);
        else allRec.EMD=RAW_EMD;
        gsConnected=true;
        console.log('✅ Sheet connected: LC='+allRec.LC.length+' BG='+allRec.BG.length+' EMD='+allRec.EMD.length);
        // Log first row keys to debug field mapping
        if(allRec.LC.length) console.log('LC keys:', Object.keys(allRec.LC[0]));
        if(allRec.BG.length) console.log('BG keys:', Object.keys(allRec.BG[0]));
      }catch(e){
        allRec={LC:RAW_LC,BG:RAW_BG,EMD:RAW_EMD};
        gsConnected=false;
        console.warn('Sheet parse error:',e);
      }
      updateStatusUI();
      resolve();
    };

    const script=document.createElement('script');
    script.id='gsScript';
    script.src=SHEET_WEBHOOK_URL+'?callback=__gsCallback&t='+Date.now();
    script.onerror=()=>{
      clearTimeout(gsLoadTimeout);
      if(!allRec.LC.length)allRec.LC=RAW_LC;
      if(!allRec.BG.length)allRec.BG=RAW_BG;
      if(!allRec.EMD.length)allRec.EMD=RAW_EMD;
      gsConnected=false;
      updateStatusUI();
      resolve();
    };
    document.head.appendChild(script);
  });
}
function renderAll(){renderSummary();renderLC();renderBG();renderEMD();renderFlow('LC');renderEmails('LC');}
loadFB().then(()=>loadData()).then(()=>{renderAll();renderFBInfo();});
setInterval(()=>{loadFB().then(()=>loadData()).then(renderSummary);},30000);
